networks:
  infra_net:
    name: infra_net
    driver: bridge

services:
  mariadb:
    image: docker.io/library/mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: infra_watch
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - infra_net

  influxdb:
    image: docker.io/library/influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2
    networks:
      - infra_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra_watch
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mariadb
      - influxdb
    networks:
      - infra_net

volumes:
  mariadb_data:
  influx_data:
